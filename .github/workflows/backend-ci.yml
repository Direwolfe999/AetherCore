name: Backend CI

on:
  push:
    paths:
      - "aethercore-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "aethercore-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests-and-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aethercore-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Compile backend modules
        run: |
          python -m py_compile main.py
          python -m py_compile config.py
          python -m py_compile services/sync_engine.py
          python -m py_compile services/vault_service.py
          python -m py_compile rate_limit.py
          python -m py_compile workers/tasks.py
          python -m py_compile observability/metrics.py

      - name: Dependency vulnerability scan
        run: pip-audit

  container-vulnerability-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend container image
        run: docker build -t aethercore-backend:ci ./aethercore-backend

      - name: Scan backend container image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: aethercore-backend:ci
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
