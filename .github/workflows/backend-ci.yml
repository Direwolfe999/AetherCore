name: Backend CI

on:
  push:
    paths:
      - "aethercore-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "aethercore-backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-tests-and-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aethercore-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check . --fix --exit-zero

      - name: Type check with mypy
        run: |
          mypy main.py config.py --no-error-summary 2>/dev/null || true

      - name: Run unit tests
        run: pytest tests/ -m unit --tb=short

      - name: Run integration tests
        run: pytest tests/ -m integration --tb=short

      - name: Run contract tests
        run: pytest tests/ -m contract --tb=short

      - name: Run all tests with coverage
        run: pytest tests/ --tb=short --cov-report=xml

      - name: Dependency vulnerability scan
        run: |
          pip install pip-audit
          pip-audit --skip-editable

  container-vulnerability-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend container image
        run: docker build -t aethercore-backend:ci ./aethercore-backend

      - name: Scan backend container image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: aethercore-backend:ci
          format: table
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1
